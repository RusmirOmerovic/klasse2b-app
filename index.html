<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Klasse 2b - Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        select { background-color: #334155; color: #f8fafc; border: 1px solid #475569; }
        /* Kontrastreiches Grün für Checkboxen */
        input[type="checkbox"]:checked { background-color: #22c55e; border-color: #22c55e; }
    </style>
</head>
<body class="p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-end mb-4">
            <h1 class="text-2xl font-bold text-white">Checkliste 2b: Kunstwerke für Fr. Hergarten</h1>
            <button id="adminBtn" class="text-[10px] text-slate-500 uppercase tracking-widest pb-1">Admin Login</button>
        </div>
        
        <div class="card p-4 rounded-2xl shadow-lg mb-6">
            <div class="flex justify-between mb-2 text-sm font-bold">
                <span>Fortschritt</span>
                <span id="statText" class="text-green-400">0 / 28</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-4 overflow-hidden">
                <div id="progressBar" class="h-4 rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(34,197,94,0.5)]" style="width: 0%"></div>
            </div>
        </div>

        <div id="list" class="card rounded-2xl shadow-lg overflow-hidden">
            </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://ztwwzopwgwldxoungjib.supabase.co';
    const supabaseKey = 'sb_publishable_sUM5Tv3XE4Cm2tbvd2roNg_hzaX8B5D';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let isAdmin = false;

    // Initialisierung beim Laden
    window.onload = async () => {
        await checkUser();
        // loadData wird am Ende von checkUser() aufgerufen
    };

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const adminBtn = document.getElementById('adminBtn');
        
        if (user && user.email === 'rusmiromer@gmail.com') {
            isAdmin = true;
            adminBtn.innerText = "Logout (Admin)";
            adminBtn.onclick = logout;
        } else {
            isAdmin = false;
            adminBtn.innerText = "Admin Login";
            adminBtn.onclick = login;
        }
        loadData(); // Erst laden, wenn isAdmin Status feststeht
    }

    async function login() {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
        });
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function loadData() {
        const { data, error } = await supabaseClient
            .from('schueler_status')
            .select('*')
            .order('id', { ascending: true });
        if (data) renderList(data);
    }

    function renderList(schueler) {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = `
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-[10px] uppercase text-slate-400">
                        <th class="p-3 border-b border-slate-700 w-12 text-center">Nr.</th>
                        <th class="p-3 border-b border-slate-700">Name</th>
                        <th class="p-3 border-b border-slate-700">Status</th>
                        <th class="p-3 border-b border-slate-700 text-center">Erhalten</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        `;
        
        const tbody = document.getElementById('tableBody');
        schueler.forEach(s => {
            const nameParts = s.name.split(' ');
            const nr = nameParts[0];
            const restName = nameParts.slice(1).join(' ');

            const row = document.createElement('tr');
            row.className = `border-b border-slate-700 transition-colors ${s.erhalten ? 'bg-green-900/20' : ''}`;
            
            row.innerHTML = `
                <td class="p-3 text-xs text-slate-500 text-center border-r border-slate-700/50">${nr}</td>
                <td class="p-3 text-sm font-semibold ${s.erhalten ? 'text-green-400' : 'text-slate-200'}">${restName}</td>
                <td class="p-3">
                    <select class="w-full p-1 rounded text-xs outline-none focus:ring-1 focus:ring-green-500" 
                            onchange="updateStatusText(${s.id}, this.value)">
                        <option value="-" ${s.status === '-' ? 'selected' : ''}>-</option>
                        <option value="In Arbeit" ${s.status === 'In Arbeit' ? 'selected' : ''}>🎨 In Arbeit</option>
                        <option value="Abgegeben" ${s.status === 'Abgegeben' ? 'selected' : ''}>✅ Abgegeben</option>
                    </select>
                </td>
                <td class="p-3 text-center">
                    <input type="checkbox" ${s.erhalten ? 'checked' : ''} 
                           ${!isAdmin ? 'disabled' : ''} 
                           class="w-7 h-7 rounded border-slate-600 ${!isAdmin ? 'opacity-20' : 'cursor-pointer'}" 
                           onchange="toggleStatus(${s.id}, this.checked)">
                </td>
            `;
            tbody.appendChild(row);
        });
        updateProgressBar();
    }

    async function updateStatusText(id, newText) {
        const { error } = await supabaseClient
            .from('schueler_status')
            .update({ status: newText })
            .eq('id', id);
        if (error) console.error("Fehler:", error);
    }

    async function toggleStatus(id, isChecked) {
        if (!isAdmin) return;
        const { error } = await supabaseClient
            .from('schueler_status')
            .update({ erhalten: isChecked })
            .eq('id', id);
        loadData(); 
    }

    function updateProgressBar() {
        const total = 28;
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const percent = Math.round((checked / total) * 100);
        const pb = document.getElementById('progressBar');
        if (pb) {
            pb.style.width = percent + "%";
            document.getElementById('statText').innerText = `${checked} / ${total}`;
            pb.className = "h-4 rounded-full transition-all duration-700 shadow-lg ";
            if (percent <= 30) pb.classList.add('bg-red-500');
            else if (percent <= 70) pb.classList.add('bg-orange-500');
            else pb.classList.add('bg-green-500');
        }
    }
</script>
</body>
</html>
